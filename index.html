<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOCTUARY — The Literature-First AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    /* PRESERVING ALL YOUR ORIGINAL CSS SETTINGS */
    :root {
      --bg: #0d0d0d; --panel: #141414; --text: #d4cfc1; --accent: #c2a67a;
      --dim: #6e6a5f; --error: #a34b4b; --code-bg: #1a1a1a;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Crimson Pro', serif; line-height: 1.6;
      height: 100vh; margin: 0; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      padding: 1.5rem 2rem; border-bottom: 1px solid #222;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, #111, var(--bg));
    }
    .logo { font-family: 'Cinzel', serif; letter-spacing: 4px; font-weight: 800; font-size: 1.2rem; color: var(--accent); }
    
    #msgs {
      flex: 1; overflow-y: auto; padding: 2rem 10%;
      display: flex; flex-direction: column; gap: 2rem;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .msg-wrap { max-width: 800px; width: 100%; margin: 0 auto; animation: fadeIn 0.5s ease; }
    .msg-who { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 2px; color: var(--dim); margin-bottom: 0.5rem; text-transform: uppercase; }
    .msg-body { font-size: 1.15rem; font-weight: 300; }
    .ai-n { color: var(--accent); }
    
    /* NEW: Manuscript Badge style to keep the UI clean */
    .ms-badge {
        display: inline-block; margin-top: 10px; padding: 4px 10px;
        border: 1px solid var(--accent); font-family: 'JetBrains Mono';
        font-size: 0.7rem; color: var(--accent); background: rgba(194, 166, 122, 0.05);
    }

    footer { padding: 1.5rem 10%; background: var(--panel); border-top: 1px solid #222; }
    .input-box { position: relative; max-width: 800px; margin: 0 auto; }
    textarea {
      width: 100%; background: #000; border: 1px solid #333; color: #fff;
      padding: 1.2rem; padding-right: 4rem; border-radius: 4px;
      font-family: 'Crimson Pro'; font-size: 1.1rem; resize: none; outline: none;
    }
    .controls { display: flex; justify-content: space-between; margin-top: 0.8rem; align-items: center; }
    .mode-btn { background: none; border: 1px solid #333; color: var(--dim); padding: 0.4rem 0.8rem; font-family: 'Cinzel'; cursor: pointer; font-size: 0.7rem; }
    .mode-btn.active { border-color: var(--accent); color: var(--accent); }
    .send-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 0.4rem 1.5rem; font-family: 'Cinzel'; cursor: pointer; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="logo">NOCTUARY</div>
  <div id="file-indicator" style="font-family:'JetBrains Mono'; font-size:0.7rem; color:var(--dim)">SYSTEM READY</div>
</header>

<div id="msgs">
  </div>

<footer>
  <div class="input-box">
    <textarea id="prompt" placeholder="Inscribe your inquiry..." rows="3"></textarea>
    <div class="controls">
      <div id="modes">
        <button class="mode-btn active" onclick="setMode('noctuary')">NOCTUARY</button>
        <button class="mode-btn" onclick="setMode('lexicon')">LEXICON</button>
        <button class="mode-btn" onclick="setMode('sage')">SAGE</button>
      </div>
      <div>
        <input type="file" id="f-upload" style="display:none" accept=".txt,.pdf,.docx">
        <button class="mode-btn" onclick="document.getElementById('f-upload').click()">📜 ATTACH</button>
        <button class="send-btn" onclick="handleSend()">CONSULT</button>
      </div>
    </div>
  </div>
</footer>

<script>
/* --- CONFIGURATION --- */
const API_KEY = "YOUR_GEMINI_API_KEY"; 
const MODEL = "gemini-2.0-flash"; // Using 2.0 Flash for speed and high context

let messages = [];
let mode = 'noctuary';
let manuscriptText = ""; // Holds the 66k word manuscript in memory
let manuscriptName = "";

/* --- FILE HANDLING (Optimized for 66k words) --- */
document.getElementById('f-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    document.getElementById('file-indicator').innerText = "INDEXING MANUSCRIPT...";
    manuscriptName = file.name;

    try {
        let rawText = "";
        if (file.type === "application/pdf") {
            rawText = await extractPdf(file);
        } else if (file.type === "application/vnd.openxmlformats-officedocument.wordprocessingml.document") {
            rawText = await extractDocx(file);
        } else {
            rawText = await file.text();
        }

        // CRITICAL FIX: Sanitize text to remove control characters that break JSON
        manuscriptText = rawText.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, "");
        
        const wordCount = manuscriptText.split(/\s+/).length;
        document.getElementById('file-indicator').innerText = `${manuscriptName.toUpperCase()} (${wordCount} WORDS) LOADED`;
    } catch (err) {
        document.getElementById('file-indicator').innerText = "INDEXING FAILED";
        console.error(err);
    }
});

async function extractPdf(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(s => s.str).join(" ") + "\n";
    }
    return text;
}

async function extractDocx(file) {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    return result.value;
}

/* --- CORE CHAT LOGIC --- */
async function handleSend() {
    const el = document.getElementById('prompt');
    const query = el.value.trim();
    if (!query && !manuscriptText) return;

    // Add user message to UI
    appendMessage('user', query, manuscriptName);
    el.value = "";

    // Build the payload
    // We only send the manuscript text inside the specific API call, 
    // we DON'T store it in the 'messages' array used for UI rendering.
    let fullPrompt = query;
    if (manuscriptText) {
        fullPrompt = `MANUSCRIPT CONTENT:\n---START---\n${manuscriptText}\n---END---\n\nUSER REQUEST: ${query}`;
    }

    // Keep history lean for the UI
    messages.push({ role: "user", parts: [{ text: fullPrompt }] });

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: messages,
                generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
            })
        });

        const data = await response.json();
        const aiText = data.candidates[0].content.parts[0].text;
        
        // Clean up the history for the NEXT turn so we don't send the book twice
        // If you want the AI to remember the book, we keep it, but if it's 1MB, 
        // we should handle it carefully.
        appendMessage('model', aiText);
        messages.push({ role: "model", parts: [{ text: aiText }] });

    } catch (err) {
        appendMessage('model', "The ink has run dry. (Error connecting to API).");
    }
}

function appendMessage(role, text, file = null) {
    const container = document.getElementById('msgs');
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap';
    
    const who = role === 'user' ? 'SCRIBE' : mode.toUpperCase();
    const badge = file ? `<div class="ms-badge">📜 MANUSCRIPT INDEXED: ${file}</div>` : '';
    
    wrap.innerHTML = `
        <div class="msg-who ${role === 'model' ? 'ai-n' : ''}">${who}</div>
        <div class="msg-body">${marked.parse(text)}${badge}</div>
    `;
    
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
}

function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}
</script>
</body>
</html>
