    <script>
/* --- THE CRITICAL FIXES WITHIN YOUR ORIGINAL SCRIPT --- */

// 1. Updated the API endpoint to the latest stable model
const API_KEY = "YOUR_GEMINI_API_KEY";
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent";

// 2. Added a sanitization function for large manuscripts
function sanitizeManuscript(text) {
    // This removes non-standard control characters that break the API's JSON parser
    return text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, "")
               .replace(/[^\x00-\x7F]/g, function(ch) {
                   // Keeps accented characters but ensures they are valid
                   return ch; 
               });
}

async function handleSend() {
  const promptEl = document.getElementById('prompt');
  const query = promptEl.value.trim();
  if (!query && !uploadedFile) return;

  // UI logic: Keep your existing message rendering
  const userMsgIndex = messages.length;
  messages.push({ role: 'user', content: query, file: uploadedFile ? { name: uploadedFile.name } : null });
  renderMessages();
  promptEl.value = '';
  updateSendBtn();

  // PREPARE THE CONTEXT
  let contextPrompt = "";
  if (uploadedFile) {
      // Use the cleaned version of your 66k word manuscript
      const cleanBook = sanitizeManuscript(uploadedFile.content);
      contextPrompt = `MANUSCRIPT CONTEXT:\n---START---\n${cleanBook}\n---END---\n\n`;
  }

  // Construct the API payload
  // We combine the manuscript with the query only for the API call to keep the UI snappy
  const apiMessages = messages.map((m, idx) => {
      let text = m.content;
      if (idx === userMsgIndex && uploadedFile) {
          text = contextPrompt + "SCRIBE'S INQUIRY: " + m.content;
      }
      return { role: m.role === 'user' ? 'user' : 'model', parts: [{ text: text }] };
  });

  try {
    const response = await fetch(`${API_URL}?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: apiMessages })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const aiText = data.candidates[0].content.parts[0].text;
    
    // Trigger your original typewriter effect
    const aiMsgIndex = messages.length;
    messages.push({ role: 'model', content: '' });
    await typewriter(aiText, aiMsgIndex);

  } catch (err) {
    console.error("Noctuary Engine Error:", err);
    // Use your original error styling
    const errorMsg = "The ink has blurred... " + err.message;
    messages.push({ role: 'model', content: errorMsg });
    renderMessages();
  }
}

// [ALL YOUR ORIGINAL TYPEWRITER, RENDER, AND MODE-SWITCHING FUNCTIONS REMAIN UNCHANGED]
</script>
